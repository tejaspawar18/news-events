version: "3.8"
services:
  qdrant-service-apis:
    build:
      context: .
      dockerfile: Dockerfile
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGO_URI=${MONGO_URI}
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - API_PORT=${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./logs:/app/logs
    restart: always
    networks:
      - events_db_network

networks:
  events_db_network:
    external: true
